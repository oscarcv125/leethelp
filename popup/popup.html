<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LeetHelp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Geist:wght@300..800&family=Geist+Mono:wght@400..700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1 class="wordmark">LeetHelp</h1>
      <p class="dek">A competitive programming reader</p>
    </header>

    <hr class="rule thick" />

    <section class="settings">
      <label class="row">
        <span>provider</span>
        <select id="provider"></select>
      </label>
      <label class="row">
        <span>model</span>
        <select id="model"></select>
      </label>
      <label class="row">
        <span>language</span>
        <select id="language"></select>
      </label>
      <label class="row">
        <span>temperature <em id="tempVal">0.4</em></span>
        <input type="range" id="temperature" min="0" max="10" step="1" />
      </label>
    </section>

    <hr class="rule" />

    <button id="openOverlay" class="ghost-btn primary">Open on current tab  →</button>
    <button id="openOptions" class="ghost-btn">Manage keys</button>

    <p class="colophon" id="status">The free Groq key is baked in.</p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
